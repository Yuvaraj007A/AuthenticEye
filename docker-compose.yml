version: '3.9'

services:
  # ─── MongoDB ───────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: authenticeye-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: authenticeye
    networks:
      - app-network

  # ─── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: authenticeye-redis
    restart: unless-stopped
    networks:
      - app-network

  # ─── Backend ───────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: authenticeye-backend
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongodb:27017/authenticeye
      - JWT_SECRET=${JWT_SECRET}
      - AI_SERVICE_URL=http://ai-service:8000
      - FRONTEND_URL=http://localhost:80
      - PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
    networks:
      - app-network
    volumes:
      - ./backend/uploads:/app/uploads

  # ─── AI Microservice ───────────────────────────────────────────
  ai-service:
    build: ./ai-service
    container_name: authenticeye-ai
    restart: unless-stopped
    environment:
      - CHECKPOINT_DIR=/app/checkpoints
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - app-network
    volumes:
      - ./ai-service/checkpoints:/app/checkpoints
    # ─── GPU Support (Uncomment for CUDA GPU) ───────────────────
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ─── Frontend ──────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: authenticeye-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mongo_data:

networks:
  app-network:
    driver: bridge
